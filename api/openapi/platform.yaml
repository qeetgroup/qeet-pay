components:
  schemas:
    TemplateRequest:
      type: object
      properties:
        templateKey:
          type: string
          minLength: 1
        channel:
          type: string
          enum:
          - WHATSAPP
          - SMS
          - EMAIL
        body:
          type: string
          minLength: 1
      required:
      - body
      - channel
      - templateKey
    TemplateView:
      type: object
      properties:
        id:
          type: string
        templateKey:
          type: string
        channel:
          type: string
        body:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
    ConnectionRequest:
      type: object
      properties:
        target:
          type: string
          minLength: 1
        enabled:
          type: boolean
        webhookUrl:
          type: string
        zohoOrganizationId:
          type: string
      required:
      - target
    ConnectionView:
      type: object
      properties:
        id:
          type: string
        target:
          type: string
        enabled:
          type: boolean
        webhookUrl:
          type: string
        zohoOrganizationId:
          type: string
        updatedAt:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      properties:
        url:
          type: string
          minLength: 1
        events:
          type: string
        signingSecret:
          type: string
          minLength: 1
      required:
      - signingSecret
      - url
    EndpointView:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        events:
          type: string
        status:
          type: string
    WhatsAppPayRequest:
      type: object
      properties:
        payerPhone:
          type: string
        payerVpa:
          type: string
        amountMinor:
          type: integer
          format: int64
        currency:
          type: string
        description:
          type: string
        relatedRef:
          type: string
      required:
      - amountMinor
    PayCollectionView:
      type: object
      properties:
        id:
          type: string
        payerPhone:
          type: string
        payerVpa:
          type: string
        amountMinor:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
        description:
          type: string
        providerRef:
          type: string
        ledgerEntryId:
          type: string
        relatedRef:
          type: string
        createdAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
    ConfirmRequest:
      type: object
      properties:
        providerRef:
          type: string
        success:
          type: boolean
    InboundRequest:
      type: object
      properties:
        from:
          type: string
          minLength: 1
        text:
