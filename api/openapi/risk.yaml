components:
  schemas:
    ScheduleRequest:
      type: object
      properties:
        subjectName:
          type: string
          minLength: 1
        subjectRef:
          type: string
        agentId:
          type: string
        scheduledAt:
          type: string
          format: date-time
      required:
      - subjectName
    SessionView:
      type: object
      properties:
        id:
          type: string
        merchantId:
          type: string
        subjectName:
          type: string
        subjectRef:
          type: string
        status:
          type: string
        agentId:
          type: string
        scheduledAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        livenessScore:
          type: integer
          format: int32
        geoTag:
          type: string
        retentionExpiresAt:
          type: string
          format: date-time
        failureReason:
          type: string
    FailRequest:
      type: object
      properties:
        reason:
          type: string
    CompleteRequest:
      type: object
      properties:
        biometricRef:
          type: string
          minLength: 1
        livenessScore:
          type: integer
          format: int32
          maximum: 100
          minimum: 0
        geoTag:
          type: string
      required:
      - biometricRef
    AddRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        pan:
          type: string
        din:
          type: string
        nationality:
          type: string
        ownershipBps:
          type: integer
          format: int32
          maximum: 10000
          minimum: 1001
        controlPerson:
          type: boolean
      required:
      - name
      - ownershipBps
    OwnerView:
      type: object
      properties:
        id:
          type: string
        merchantId:
          type: string
        name:
          type: string
        pan:
          type: string
        din:
          type: string
        nationality:
          type: string
        ownershipBps:
          type: integer
          format: int32
        controlPerson:
          type: boolean
        panStatus:
          type: string
        createdAt:
          type: string
          format: date-time
    KybPanRequest:
      type: object
      properties:
        pan:
          type: string
          minLength: 1
      required:
      - pan
    KybView:
      type: object
      properties:
        merchantId:
          type: string
        overallStatus:
          type: string
        panStatus:
          type: string
        gstinStatus:
          type: string
        bankStatus:
          type: string
        verifiedAt:
          type: string
          format: date-time
    GstinRequest:
      type: object
      properties:
        gstin:
          type: string
          minLength: 1
      required:
      - gstin
    BankRequest:
      type: object
      properties:
        accountNumber:
          type: string
          minLength: 1
        ifsc:
          type: string
          minLength: 1
      required:
      - accountNumber
      - ifsc
    CreateRequest:
      type: object
      properties:
        customerRef:
          type: string
          minLength: 1
        fullName:
          type: string
          minLength: 1
        consentGiven:
          type: boolean
        consentArtifact:
          type: string
      required:
      - customerRef
      - fullName
    KycView:
      type: object
      properties:
        id:
          type: string
        merchantId:
          type: string
        customerRef:
          type: string
        fullName:
          type: string
        aadhaarLast4:
          type: string
        aadhaarTxnId:
          type: string
        aadhaarStatus:
          type: string
        pan:
          type: string
        panStatus:
          type: string
        consentGiven:
          type: boolean
        consentAt:
          type: string
          format: date-time
        overallStatus:
          type: string
        verifiedAt:
          type: string
          format: date-time
    KycPanRequest:
      type: object
      properties:
        pan:
          type: string
          minLength: 1
      required:
      - pan
    ConsentRequest:
      type: object
      properties:
        consentArtifact:
          type: string
    AadhaarVerifyRequest:
      type: object
      properties:
        txnId:
          type: string
          minLength: 1
        otp:
          type: string
          minLength: 1
      required:
      - otp
      - txnId
    AadhaarInitiateRequest:
      type: object
      properties:
        aadhaar:
          type: string
          minLength: 1
      required:
      - aadhaar
    CreateStrRequest:
      type: object
      properties:
        caseId:
          type: string
          format: uuid
        subject:
          type: string
          minLength: 1
        grounds:
          type: string
          minLength: 1
        fileImmediately:
          type: boolean
      required:
      - grounds
      - subject
    StrView:
      type: object
      properties:
        id:
          type: string
        caseId:
          type: string
        subject:
          type: string
        grounds:
          type: string
        status:
          type: string
        fiuReferenceId:
          type: string
        createdAt:
          type: string
          format: date-time
        filedAt:
          type: string
          format: date-time
    ScreenRequest:
      type: object
      properties:
        partyType:
          type: string
          enum:
          - INDIVIDUAL
          - BUSINESS
          - BENEFICIARY
        partyName:
          type: string
          minLength: 1
        identifier:
          type: string
      required:
      - partyName
      - partyType
    ScreeningView:
      type: object
      properties:
        id:
          type: string
        partyType:
          type: string
        partyName:
          type: string
        identifier:
          type: string
        result:
          type: string
        matchCount:
          type: integer
          format: int32
        riskScore:
          type: integer
          format: int32
        screenedAt:
          type: string
          format: date-time
    MuleScanRequest:
      type: object
      properties:
        beneficiaryRef:
          type: string
          minLength: 1
        inboundMinor:
          type: integer
          format: int64
        outboundMinor:
          type: integer
          format: int64
        inboundCount:
          type: integer
          format: int32
        outboundCount:
          type: integer
          format: int32
        medianHoldSeconds:
          type: integer
          format: int64
        distinctCounterparties:
          type: integer
          format: int32
      required:
      - beneficiaryRef
    MuleView:
      type: object
      properties:
        beneficiaryRef:
          type: string
        riskScore:
          type: integer
          format: int32
        severity:
          type: string
        flagged:
          type: boolean
        reasons:
          type: array
          items:
            type: string
    MonitorRequest:
      type: object
      properties:
        transactionRef:
          type: string
          minLength: 1
        amountMinor:
          type: integer
          format: int64
        currency:
          type: string
          minLength: 1
        mcc:
          type: integer
          format: int32
        countryCode:
          type: string
        txnCount24h:
          type: integer
          format: int32
        amount24hMinor:
          type: integer
          format: int64
        beneficiaryRef:
          type: string
      required:
      - amountMinor
      - currency
      - transactionRef
    AlertView:
      type: object
      properties:
        id:
          type: string
        subjectRef:
          type: string
        transactionRef:
          type: string
        ruleCode:
          type: string
        category:
          type: string
        riskScore:
          type: integer
          format: int32
        severity:
          type: string
        status:
          type: string
        caseId:
          type: string
        createdAt:
          type: string
          format: date-time
    MonitorResult:
      type: object
      properties:
        alertCount:
          type: integer
          format: int32
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/AlertView"
    CreateCaseRequest:
      type: object
      properties:
        subject:
          type: string
