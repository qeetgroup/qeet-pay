        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /v1/gst/gstins:
    get:
      tags:
      - GST Invoicing
      operationId: listGstins
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
