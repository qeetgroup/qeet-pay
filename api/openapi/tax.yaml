      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegChangeView"
    post:
      tags:
      - GST AI
      operationId: createRegChange
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegChangeRequest"
        required: true
      responses:
        "200":
          description: OK
