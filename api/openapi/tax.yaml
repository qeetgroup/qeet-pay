components:
  schemas:
    TdsReturnSummary:
      type: object
      properties:
        id:
          type: string
        form:
          type: string
        fy:
          type: string
        quarter:
          type: string
        status:
          type: string
        deducteeCount:
          type: integer
          format: int32
        deductionCount:
          type: integer
          format: int32
        totalGrossMinor:
          type: integer
          format: int64
        totalTaxMinor:
          type: integer
          format: int64
        bsrCode:
          type: string
        challanNo:
          type: string
        challanDate:
          type: string
          format: date
        ackToken:
          type: string
        preparedAt:
          type: string
          format: date-time
        filedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    TdsPrepareRequest:
      type: object
      properties:
        form:
          type: string
          enum:
          - FORM_24Q
          - FORM_26Q
          - FORM_27EQ
        quarter:
          type: string
          minLength: 1
      required:
      - quarter
    TdsReturnLineView:
      type: object
      properties:
        deducteeName:
          type: string
        deducteePan:
          type: string
        section:
          type: string
        grossMinor:
          type: integer
          format: int64
        rateBps:
          type: integer
          format: int32
        taxMinor:
          type: integer
          format: int64
        deductedOn:
          type: string
          format: date
        transactionRef:
          type: string
    TdsReturnView:
      type: object
      properties:
        ret:
          $ref: "#/components/schemas/TdsReturnSummary"
        lines:
          type: array
          items:
            $ref: "#/components/schemas/TdsReturnLineView"
    RecordDeductionRequest:
      type: object
      properties:
        kind:
          type: string
          enum:
          - TDS
          - TCS
        section:
          type: string
          minLength: 1
        deducteeName:
          type: string
          minLength: 1
        deducteePan:
          type: string
        grossMinor:
          type: integer
          format: int64
        rateBps:
          type: integer
          format: int32
        transactionRef:
          type: string
        deductedOn:
          type: string
          format: date
      required:
      - deductedOn
      - deducteeName
      - grossMinor
      - kind
      - rateBps
      - section
    DeductionView:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        section:
          type: string
        deducteeName:
          type: string
        deducteePan:
          type: string
        grossMinor:
          type: integer
          format: int64
        rateBps:
          type: integer
          format: int32
        taxMinor:
          type: integer
          format: int64
        transactionRef:
          type: string
        deductedOn:
          type: string
          format: date
        quarter:
          type: string
        certificateNo:
          type: string
        createdAt:
          type: string
          format: date-time
    Gstr2bLine:
      type: object
      properties:
        supplierGstin:
          type: string
        invoiceNumber:
          type: string
        totalGstMinor:
          type: integer
          format: int64
    ReconcileRequest:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/Gstr2bLine"
      required:
      - lines
    ReconSummary:
      type: object
      properties:
        matched:
          type: integer
          format: int32
        mismatched:
          type: integer
          format: int32
        missingIn2b:
          type: integer
          format: int32
    RecordPurchaseRequest:
      type: object
      properties:
        supplierGstin:
          type: string
          minLength: 1
        supplierName:
          type: string
          minLength: 1
        invoiceNumber:
          type: string
          minLength: 1
        invoiceDate:
          type: string
          format: date
        taxableMinor:
          type: integer
          format: int64
        cgstMinor:
          type: integer
          format: int64
        sgstMinor:
          type: integer
          format: int64
        igstMinor:
          type: integer
          format: int64
        itcEligible:
          type: boolean
      required:
      - invoiceDate
      - invoiceNumber
      - supplierGstin
      - supplierName
    PurchaseView:
      type: object
      properties:
        id:
          type: string
        supplierGstin:
          type: string
        supplierName:
          type: string
        invoiceNumber:
          type: string
        invoiceDate:
          type: string
          format: date
        taxableMinor:
          type: integer
          format: int64
        cgstMinor:
          type: integer
          format: int64
        sgstMinor:
          type: integer
          format: int64
        igstMinor:
          type: integer
          format: int64
        totalGstMinor:
          type: integer
          format: int64
        itcEligible:
          type: boolean
        reconStatus:
          type: string
        createdAt:
          type: string
          format: date-time
        reconciledAt:
          type: string
          format: date-time
    FilingReturnSummary:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        period:
          type: string
        status:
          type: string
        invoiceCount:
          type: integer
          format: int32
        totalTaxableMinor:
          type: integer
          format: int64
        totalCgstMinor:
          type: integer
          format: int64
        totalSgstMinor:
          type: integer
          format: int64
        totalIgstMinor:
          type: integer
          format: int64
        totalTaxMinor:
          type: integer
          format: int64
        arn:
          type: string
        preparedAt:
          type: string
          format: date-time
        filedAt:
          type: string
          format: date-time
    FilingPrepareRequest:
      type: object
      properties:
        type:
          type: string
