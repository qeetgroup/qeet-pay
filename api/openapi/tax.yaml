                type: array
                items:
                  $ref: "#/components/schemas/PurchaseView"
    post:
      tags:
      - Input Tax Credit
      operationId: record_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPurchaseRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PurchaseView"
  /v1/gst/returns/{returnId}/file:
    post:
      tags:
      - GST Returns
      operationId: file_1
      parameters:
      - name: returnId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
