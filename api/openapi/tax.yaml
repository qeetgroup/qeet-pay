openapi: 3.1.0
info:
  title: Qeet Pay API
  description: "Qeet Pay — India-first payments, billing and GST infrastructure (UPI\
    \ / Cards / NACH). Programmatic `/v1` calls authenticate with a `qp_live_` / `qp_test_`\
    \ API key via the `X-Api-Key` header; money is always in integer minor units (paise)."
  contact:
    name: Qeet Group
    url: https://qeet.in
  license:
    name: Proprietary
    url: https://qeet.in
  version: v1
servers:
- url: http://localhost:4201
  description: Local development
- url: https://api.pay.qeet.in
  description: Production
security:
- ApiKeyAuth: []
tags:
- name: Billing
  description: "Plans, subscriptions, invoices and usage metering."
- name: Payouts
  description: Single and bulk payouts under maker-checker approval.
- name: Lending
  description: Working-capital advances repaid from settlements.
- name: Mandates
  description: Recurring mandates and idempotent mandate debits.
- name: Revenue Recognition
  description: IndAS 115 deferred-revenue schedules.
- name: KYB
  description: Merchant Know-Your-Business verification.
- name: GST Invoicing
  description: GST invoices and credit/debit notes.
- name: Cards
  description: Virtual expense/wallet cards.
- name: TDS / TCS
  description: "Record tax-at-source deductions, issue deductee certificates, and\
    \ pull per-section quarterly summaries."
- name: E-Invoicing (IRN)
  description: IRP registration for IRN + signed QR.
- name: GST Returns
  description: GSTR-1/GSTR-3B preparation and GSTN filing.
- name: Messaging
  description: WhatsApp/SMS/email templates and dispatch.
- name: GST Invoicing
  description: Create GST invoices (auto CGST/SGST/IGST breakup + numbering) and record
    idempotent invoice payment.
- name: Payment Links
  description: Shareable payment links — fixed or payer-entered amount.
- name: Insurance
  description: Embedded protection policies and claims.
- name: Cross-Border
  description: Export invoices and inward FX remittances (FIRA).
- name: Merchants
  description: Merchant onboarding and current-merchant profile.
- name: Payments
  description: "Accept payments (create, capture) and inbound provider webhooks."
- name: Orchestration
  description: Smart provider routing — scorecards and cost basis.
- name: Platform
  description: Request-identity introspection and health probes.
- name: Reconciliation
  description: Provider settlements and auto-reconciliation.
- name: TDS / TCS
  description: "Tax-at-source deductions, certificates and summaries."
- name: Escrow
  description: "Conditional hold, release-to-seller and refund."
- name: TDS / TCS Returns
  description: "Prepare, export, and file quarterly TDS/TCS statutory returns (Form\
    \ 24Q/26Q/27EQ)."
- name: Input Tax Credit
  description: Purchase invoices reconciled against GSTR-2B.
- name: Analytics
  description: "TPV, MRR/ARR, success rate and cash-flow forecasting."
- name: Checkout
  description: "Public hosted-checkout — pay a link by its code, no API key."
- name: E-Invoicing (IRN)
  description: Register a GST invoice at the IRP to obtain its IRN + signed QR; read
    IRN details and cancel within the window.
- name: Marketplace
  description: Seller registration and split settlements (TCS/TDS).
- name: Dunning
  description: Failed-payment retry rules and attempt history.
- name: ESG / Carbon
  description: Per-transaction carbon footprint and offsets.
- name: Input Tax Credit
  description: "Record inward-supply purchase invoices, reconcile them against supplier-filed\
    \ GSTR-2B, and report eligible ITC."
- name: Ledger
  description: Double-entry ledger accounts and balanced journal entries.
- name: Virtual Accounts
  description: Per-customer virtual accounts with auto-reconciled credits.
- name: GST Returns
  description: Prepare GSTR-1/GSTR-3B returns for a tax period from merchant invoices
    and file them to GSTN (ARN).
- name: Webhooks
  description: Webhook endpoint registration and delivery history.
- name: BNPL
  description: Buy-Now-Pay-Later installment agreements.
- name: GST Invoicing
  description: Issue GST credit/debit notes against invoices and manage multi-GSTIN
    registration.
- name: GST AI
  description: AI-assisted HSN/SAC classification and the Regulatory-Change Impact
    Radar — both via the AiGateway §6.4 safety matrix with a deterministic fallback.
paths:
  /v1/tds/returns/{returnId}/file:
    post:
      tags:
      - TDS / TCS Returns
      operationId: file
      parameters:
      - name: returnId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TdsReturnSummary"
  /v1/tds/returns/prepare:
    post:
      tags:
      - TDS / TCS Returns
      operationId: prepare
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TdsPrepareRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TdsReturnView"
  /v1/tds/deductions:
    get:
      tags:
      - TDS / TCS
      operationId: list
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeductionView"
    post:
      tags:
      - TDS / TCS
      operationId: record
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordDeductionRequest"
