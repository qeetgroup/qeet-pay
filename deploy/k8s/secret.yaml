# TEMPLATE — do NOT commit real values. Replace the placeholders and apply out of
# band, or (preferred) generate this Secret from your secret manager / sealed-secrets
# / External Secrets Operator. Uses stringData so values are plain text here.
#
# RLS: DATABASE_USER MUST be the NOSUPERUSER `qeet_pay_app` role (Flyway V2), not
# the superuser/owner used for migrations — a superuser bypasses every Row-Level
# Security policy and breaks tenant isolation (CLAUDE.md "Gotchas").
apiVersion: v1
kind: Secret
metadata:
  name: qeet-pay-backend-secret
  namespace: qeet-pay
  labels:
    app.kubernetes.io/name: qeet-pay-backend
    app.kubernetes.io/part-of: qeet-pay
type: Opaque
stringData:
  # JDBC URL for a managed Postgres 17 (RDS / Cloud SQL / Neon …).
  DATABASE_URL: "jdbc:postgresql://REPLACE_ME_DB_HOST:5432/qeet_pay"
  DATABASE_USER: "qeet_pay_app"
  DATABASE_PASSWORD: "REPLACE_ME_DB_PASSWORD"

  # Razorpay live credentials (only read when QEETPAY_RAZORPAY_ENABLED=true).
  QEETPAY_RAZORPAY_ENABLED: "false"
  QEETPAY_RAZORPAY_KEY_ID: ""
  QEETPAY_RAZORPAY_KEY_SECRET: ""
  QEETPAY_RAZORPAY_WEBHOOK_SECRET: ""
