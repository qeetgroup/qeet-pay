# Qeet Pay backend — Spring Boot modular monolith (Java 21).
# Image is built from the root Dockerfile; retag/push to your registry.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qeet-pay-backend
  namespace: qeet-pay
  labels:
    app.kubernetes.io/name: qeet-pay-backend
    app.kubernetes.io/part-of: qeet-pay
spec:
  # Baseline; the HPA (backend-hpa.yaml) owns the actual replica count.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: qeet-pay-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qeet-pay-backend
        app.kubernetes.io/part-of: qeet-pay
      annotations:
        # Prometheus scrape (Micrometer registry is enabled in build.gradle.kts).
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "4201"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/qeetgroup/qeet-pay-backend:latest # pin to a digest/tag in prod
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4201
          # Non-secret config + secret credentials, merged into the environment.
          envFrom:
            - configMapRef:
                name: qeet-pay-backend-config
            - secretRef:
                name: qeet-pay-backend-secret
          # Spring Boot Actuator probes (enabled in application.yml; permitAll in
          # SecurityConfig, so no auth needed). Readiness flips UP after Flyway.
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 30 # up to ~150s for migrations on a cold DB
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2"
              memory: "1536Mi" # JVM MaxRAMPercentage=75% => ~1.1Gi heap
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # readOnlyRootFilesystem needs writable scratch for the JVM/Tomcat temp.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
