# Dependency Review — blocks PRs that introduce vulnerable or disallowed-license
# dependencies (Gradle, pnpm, Go modules). Lightweight: diffs the dependency graph,
# no build required.
name: dependency-review

on:
  pull_request:

concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # to post the summary comment on the PR

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
