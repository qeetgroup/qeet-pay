# CLI CI — the `qp` command-line client at cli/ (Go module, stdlib-only).
# Path-filtered so only cli/ changes trigger it.
name: cli

on:
  push:
    branches: [main, develop]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"

concurrency:
  group: cli-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: cli

jobs:
  build-test:
    name: Go · build · vet · test · gofmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # go-version-file reads the `go` directive from cli/go.mod (currently 1.25.2)
      # so the toolchain stays in lockstep with the module without a second source.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.mod

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean; run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...