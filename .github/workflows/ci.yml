name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build + test (Testcontainers spins Postgres; includes Modulith verify + RLS isolation)
        run: ./gradlew build --no-daemon