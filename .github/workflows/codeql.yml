# CodeQL — static security analysis across the polyglot repo (Java, Go, TS/JS).
# Runs on pushes/PRs to main and on a weekly schedule. Kept off `develop` PR
# churn deliberately: the java-kotlin autobuild compiles the whole Gradle module.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 04:27 UTC — catches newly-published advisories against unchanged code.
    - cron: "27 4 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # required by codeql-action/analyze to upload SARIF

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin) for the java-kotlin autobuild
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go for the go autobuild
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"